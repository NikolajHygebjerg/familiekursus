<!DOCTYPE html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Familiekursus Cast</title>
    <style>
      html,
      body {
        margin: 0;
        background: #0f172a;
        color: #f8fafc;
        font-family: system-ui, sans-serif;
      }

      #splash {
        display: grid;
        place-items: center;
        min-height: 100vh;
        font-size: 2rem;
        padding: 2rem;
        text-align: center;
      }

      iframe {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }
    </style>
  </head>
  <body>
    <div id="splash">Vælg en sang i Familiekursus-appen</div>
    <iframe id="display" hidden title="Sangvisning"></iframe>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script>
      const NAMESPACE = "urn:x-cast:com.familiekursus.sange";
      const splash = document.getElementById("splash");
      const display = document.getElementById("display");
      const context = cast.framework.CastReceiverContext.getInstance();

      function showSong(songId) {
        display.src = "/cast/display.html?id=" + encodeURIComponent(songId);
        display.hidden = false;
        splash.hidden = true;
      }

      context.addCustomMessageListener(NAMESPACE, (event) => {
        const data = event.data || {};
        if (data.id) {
          showSong(data.id);
        }
      });

      context.start();
    </script>
  </body>
</html>
